<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saga</title>
    <style>
      /* Layout crítico do splash (pinta antes do bundle; a animação vem do style.css) */
      #splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 14px;
        background: #f4f1e9;
        z-index: 50;
      }
      #splash .splash-word {
        font: 800 22px system-ui, sans-serif;
        letter-spacing: 0.05em;
        color: #1c3f73;
      }
      #splash .splash-sub {
        font: 13px system-ui, sans-serif;
        color: #5a7596;
      }
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #0e1d33;
        }
        #splash .splash-word {
          color: #eaf1f7;
        }
        #splash .splash-sub {
          color: #8fa6c2;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-busy="true" aria-label="A carregar a Saga">
      <svg class="caravel-loader" width="132" height="132" viewBox="0 0 96 96" role="img" aria-label="Caravela a navegar">
        <defs>
          <symbol id="splash-cx" viewBox="-50 -50 100 100">
            <path d="M -10 -15 L -30 -50 L 30 -50 L 10 -15 L 15 -10 L 50 -30 L 50 30 L 15 10 L 10 15 L 30 50 L -30 50 L -10 15 L -15 10 L -50 30 L -50 -30 L -15 -10 Z" fill="#2f6ea5"/>
            <path transform="scale(0.46)" d="M -10 -15 L -30 -50 L 30 -50 L 10 -15 L 15 -10 L 50 -30 L 50 30 L 15 10 L 10 15 L 30 50 L -30 50 L -10 15 L -15 10 L -50 30 L -50 -30 L -15 -10 Z" fill="#f4f1e9"/>
          </symbol>
          <clipPath id="splash-clip"><rect x="5" y="5" width="86" height="86" rx="20"/></clipPath>
        </defs>
        <rect x="5" y="5" width="86" height="86" rx="20" fill="#f4f1e9" stroke="#1c3f73" stroke-width="4"/>
        <g clip-path="url(#splash-clip)">
          <path class="cl-wave-b" d="M-30 73 q15 -5 30 0 t30 0 t30 0 t30 0 t30 0 t30 0 t30 0 t30 0 L240 96 L-30 96 Z" fill="#1c3f73"/>
          <g class="cl-ship">
            <g transform="translate(13 0) rotate(-26 40 56)" stroke="#1c3f73" stroke-linejoin="round">
              <g stroke-width="1.4" opacity="0.8">
                <line x1="40" y1="18" x2="22" y2="52"/>
                <line x1="40" y1="18" x2="58" y2="52"/>
              </g>
              <line x1="40" y1="16" x2="40" y2="56" stroke="#1c3f73" stroke-width="3"/>
              <path d="M40 17 L55 22 L40 27 Z" fill="#d98e3c" stroke="#c8782a" stroke-width="1"/>
              <path d="M22 27 Q40 34 58 27 L61 49 Q40 56 19 49 Z" fill="#f4f1e9" stroke-width="3"/>
              <use href="#splash-cx" x="31" y="33" width="16" height="16"/>
              <path d="M22 52 Q40 62 58 52 Q55 65 40 65 Q25 65 22 52 Z" fill="#2f6ea5" stroke-width="3"/>
              <path d="M22 52 Q40 62 58 52 L57 56 Q40 66 23 56 Z" fill="#6fa8d6" stroke="none"/>
            </g>
          </g>
          <path class="cl-wave-a" d="M-30 65 q15 -5 30 0 t30 0 t30 0 t30 0 t30 0 t30 0 t30 0 t30 0 L240 96 L-30 96 Z" fill="#2f6ea5"/>
          <path class="cl-foam" d="M-30 65 q15 -5 30 0 t30 0 t30 0 t30 0 t30 0 t30 0 t30 0 t30 0" fill="none" stroke="#dbeaf4" stroke-width="3" stroke-linecap="round"/>
        </g>
        <rect x="5" y="5" width="86" height="86" rx="20" fill="none" stroke="#1c3f73" stroke-width="4"/>
      </svg>
      <div class="splash-word">Saga</div>
      <div class="splash-sub">a navegar…</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
