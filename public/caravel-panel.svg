<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 880" width="600" height="880" role="img" aria-label="Painel de azulejo: nau portuguesa com velas da Cruz de Cristo">
  <defs>
    <!-- Cruz de Cristo (cross pattée, centro vazado) -->
    <symbol id="cross" viewBox="-50 -50 100 100">
      <path d="M -10 -15 L -30 -50 L 30 -50 L 10 -15 L 15 -10 L 50 -30 L 50 30 L 15 10 L 10 15 L 30 50 L -30 50 L -10 15 L -15 10 L -50 30 L -50 -30 L -15 -10 Z" fill="#2f6ea5"/>
      <path transform="scale(0.46)" d="M -10 -15 L -30 -50 L 30 -50 L 10 -15 L 15 -10 L 50 -30 L 50 30 L 15 10 L 10 15 L 30 50 L -30 50 L -10 15 L -15 10 L -50 30 L -50 -30 L -15 -10 Z" fill="#f4f1e9"/>
    </symbol>

    <!-- Cordão (guilloche) horizontal -->
    <pattern id="ropeH" width="56" height="64" patternUnits="userSpaceOnUse">
      <g stroke="#1c3f73" stroke-width="3" fill="#eaf0f4">
        <ellipse cx="14" cy="32" rx="22" ry="12" transform="rotate(32 14 32)"/>
        <ellipse cx="42" cy="32" rx="22" ry="12" transform="rotate(-32 42 32)"/>
      </g>
      <circle cx="28" cy="32" r="6" fill="#d98e3c" stroke="#c8782a" stroke-width="1.5"/>
    </pattern>
    <!-- Cordão vertical -->
    <pattern id="ropeV" width="64" height="56" patternUnits="userSpaceOnUse">
      <g stroke="#1c3f73" stroke-width="3" fill="#eaf0f4">
        <ellipse cx="32" cy="14" rx="12" ry="22" transform="rotate(-32 32 14)"/>
        <ellipse cx="32" cy="42" rx="12" ry="22" transform="rotate(32 32 42)"/>
      </g>
      <circle cx="32" cy="28" r="6" fill="#d98e3c" stroke="#c8782a" stroke-width="1.5"/>
    </pattern>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d3e4f1"/>
      <stop offset="0.65" stop-color="#eef2ee"/>
      <stop offset="1" stop-color="#f4f1e9"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fa8d6"/>
      <stop offset="1" stop-color="#2f6ea5"/>
    </linearGradient>

    <!-- corte da cena interior -->
    <clipPath id="scene"><rect x="78" y="78" width="444" height="724"/></clipPath>

    <!-- canto: cruz-floral -->
    <g id="corner">
      <g fill="#1c3f73">
        <path d="M32 8 q6 12 0 24 q-6 -12 0 -24 Z"/>
        <path d="M32 56 q6 -12 0 -24 q-6 12 0 24 Z"/>
        <path d="M8 32 q12 6 24 0 q-12 -6 -24 0 Z"/>
        <path d="M56 32 q-12 6 -24 0 q12 -6 24 0 Z"/>
        <circle cx="32" cy="32" r="5"/>
        <circle cx="16" cy="16" r="2.5"/>
        <circle cx="48" cy="16" r="2.5"/>
        <circle cx="16" cy="48" r="2.5"/>
        <circle cx="48" cy="48" r="2.5"/>
      </g>
    </g>
  </defs>

  <!-- ground glaze -->
  <rect width="600" height="880" fill="#f4f1e9"/>

  <!-- tile seams -->
  <g stroke="#b9cdde" stroke-width="1" opacity="0.5">
    <line x1="120" y1="0" x2="120" y2="880"/>
    <line x1="240" y1="0" x2="240" y2="880"/>
    <line x1="360" y1="0" x2="360" y2="880"/>
    <line x1="480" y1="0" x2="480" y2="880"/>
    <line x1="0" y1="125" x2="600" y2="125"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="375" x2="600" y2="375"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="625" x2="600" y2="625"/>
    <line x1="0" y1="750" x2="600" y2="750"/>
  </g>

  <!-- scene -->
  <g clip-path="url(#scene)">
    <rect x="78" y="78" width="444" height="724" fill="url(#sky)"/>
    <!-- clouds -->
    <g fill="#cfe0ee" opacity="0.9">
      <ellipse cx="170" cy="150" rx="70" ry="26"/>
      <ellipse cx="220" cy="135" rx="55" ry="24"/>
      <ellipse cx="410" cy="200" rx="80" ry="28"/>
      <ellipse cx="360" cy="190" rx="50" ry="22"/>
    </g>

    <!-- sea: scalloped wave rows -->
    <rect x="78" y="540" width="444" height="262" fill="url(#sea)"/>
    <g fill="none" stroke-linecap="round">
      <path d="M78 560 q22 -16 44 0 t44 0 t44 0 t44 0 t44 0 t44 0 t44 0 t44 0 t44 0 t44 0" stroke="#bcd6e8" stroke-width="5" opacity="0.7"/>
      <path d="M78 600 q26 -18 52 0 t52 0 t52 0 t52 0 t52 0 t52 0 t52 0 t52 0 t52 0" stroke="#dbeaf4" stroke-width="5" opacity="0.6"/>
      <path d="M78 650 q30 -20 60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0" stroke="#1c3f73" stroke-width="4" opacity="0.4"/>
      <path d="M78 710 q34 -22 68 0 t68 0 t68 0 t68 0 t68 0 t68 0 t68 0" stroke="#bcd6e8" stroke-width="6" opacity="0.7"/>
      <path d="M78 760 q30 -20 60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0" stroke="#dbeaf4" stroke-width="6" opacity="0.6"/>
    </g>

    <!-- ===== CARRACK (nau ~1500), broadside, heeled on the swell (~18°) ===== -->
    <g transform="rotate(-18 300 584)" stroke="#1c3f73" stroke-width="2.5" stroke-linejoin="round">
      <!-- standing rigging (behind) -->
      <g stroke="#1c3f73" stroke-width="1.2" fill="none" opacity="0.7">
        <line x1="300" y1="172" x2="250" y2="560"/>
        <line x1="300" y1="172" x2="352" y2="560"/>
        <line x1="225" y1="256" x2="196" y2="556"/>
        <line x1="225" y1="256" x2="258" y2="556"/>
        <line x1="378" y1="302" x2="360" y2="552"/>
        <line x1="378" y1="302" x2="406" y2="552"/>
        <line x1="300" y1="158" x2="226" y2="250"/>
        <line x1="300" y1="158" x2="100" y2="514"/>
        <line x1="378" y1="302" x2="302" y2="168"/>
        <g stroke-width="0.8">
          <line x1="270" y1="360" x2="332" y2="360"/>
          <line x1="264" y1="424" x2="338" y2="424"/>
          <line x1="258" y1="488" x2="344" y2="488"/>
        </g>
      </g>

      <!-- bowsprit -->
      <line x1="182" y1="556" x2="98" y2="512" stroke="#1c3f73" stroke-width="5"/>

      <!-- masts + yards + tops -->
      <g stroke="#1c3f73" stroke-width="5" fill="#2f6ea5">
        <line x1="225" y1="250" x2="227" y2="558"/>
        <line x1="300" y1="150" x2="300" y2="566"/>
        <line x1="378" y1="300" x2="376" y2="556"/>
        <ellipse cx="300" cy="232" rx="16" ry="5"/>
        <ellipse cx="225" cy="328" rx="13" ry="4"/>
        <g stroke-width="3">
          <line x1="185" y1="330" x2="265" y2="330"/>
          <line x1="196" y1="256" x2="254" y2="256"/>
          <line x1="248" y1="330" x2="362" y2="330"/>
          <line x1="256" y1="234" x2="352" y2="234"/>
          <line x1="270" y1="173" x2="338" y2="173"/>
        </g>
      </g>

      <!-- lateen yard (mizzen) -->
      <line x1="346" y1="362" x2="432" y2="222" stroke="#1c3f73" stroke-width="4"/>

      <!-- sails -->
      <g fill="#f4f1e9">
        <!-- mizzen lateen -->
        <path d="M350 358 L428 228 Q432 350 396 450 Q370 416 350 358 Z"/>
        <!-- main course -->
        <path d="M250 332 Q305 348 360 332 L372 452 Q305 474 238 452 Z"/>
        <!-- main topsail -->
        <path d="M258 236 Q305 248 352 236 L362 330 Q305 344 248 330 Z"/>
        <!-- main topgallant -->
        <path d="M272 175 Q305 183 338 175 L344 232 Q305 242 266 232 Z"/>
        <!-- fore course -->
        <path d="M187 332 Q226 344 265 332 L274 430 Q226 446 178 430 Z"/>
        <!-- fore topsail -->
        <path d="M198 258 Q226 267 254 258 L260 330 Q226 342 192 330 Z"/>
        <!-- spritsail under bowsprit -->
        <path d="M120 548 Q146 556 172 548 L176 584 Q146 594 116 584 Z"/>
      </g>
      <!-- sail shading -->
      <g fill="#bcd6e8" opacity="0.5" stroke="none">
        <path d="M392 250 L428 228 Q432 350 396 450 Q388 360 390 300 Z"/>
        <path d="M330 336 L360 332 L372 452 Q344 466 330 469 Z"/>
        <path d="M242 336 L265 332 L274 430 Q250 442 240 444 Z"/>
      </g>

      <!-- crosses of Christ -->
      <use href="#cross" x="276" y="362" width="58" height="58"/>
      <use href="#cross" x="282" y="256" width="46" height="46"/>
      <use href="#cross" x="200" y="358" width="50" height="50"/>

      <!-- hull -->
      <g fill="#2f6ea5">
        <path d="M170 572 C 200 600 252 620 305 620 C 358 620 408 602 440 578 L444 560 C 388 572 348 576 300 575 C 248 574 210 568 185 558 Z"/>
        <path d="M180 567 C 232 581 300 585 360 581 C 400 578 426 571 442 563 L444 560 C 388 572 348 576 300 575 C 248 574 210 568 185 558 Z" fill="#6fa8d6"/>
        <!-- forecastle (bow, left) -->
        <path d="M166 560 L170 524 Q174 516 186 516 L214 521 Q220 542 216 564 Z"/>
        <!-- sterncastle (stern, right) — two tiers -->
        <path d="M390 568 L392 520 Q394 510 406 510 L446 515 Q450 552 446 576 Z"/>
        <path d="M398 514 L400 494 Q402 488 410 488 L440 492 Q444 506 442 514 Z"/>
      </g>
      <!-- hull detail -->
      <g fill="#1c3f73" stroke="none">
        <circle cx="232" cy="596" r="4.5"/><circle cx="260" cy="600" r="4.5"/>
        <circle cx="288" cy="602" r="4.5"/><circle cx="316" cy="602" r="4.5"/>
        <circle cx="344" cy="600" r="4.5"/><circle cx="372" cy="595" r="4.5"/>
        <circle cx="192" cy="540" r="3.5"/>
        <rect x="407" y="528" width="9" height="11" rx="1.5"/>
        <rect x="424" y="530" width="9" height="11" rx="1.5"/>
        <rect x="414" y="498" width="8" height="9" rx="1.5"/>
      </g>

      <!-- flags / pennants -->
      <g>
        <line x1="300" y1="150" x2="300" y2="118" stroke="#1c3f73" stroke-width="2"/>
        <path d="M300 120 Q332 116 362 126 Q332 132 300 132 Z" fill="#1c3f73"/>
        <line x1="225" y1="250" x2="225" y2="230" stroke="#1c3f73" stroke-width="2"/>
        <path d="M225 232 L251 238 L225 245 Z" fill="#f4f1e9" stroke="#1c3f73" stroke-width="1.5"/>
        <line x1="378" y1="300" x2="378" y2="282" stroke="#1c3f73" stroke-width="2"/>
        <path d="M378 284 L402 290 L378 296 Z" fill="#f4f1e9" stroke="#1c3f73" stroke-width="1.5"/>
        <!-- stern flag on staff -->
        <line x1="449" y1="514" x2="455" y2="484" stroke="#1c3f73" stroke-width="2"/>
        <path d="M455 486 L491 492 L489 512 L453 506 Z" fill="#1c3f73"/>
        <circle cx="472" cy="499" r="4" fill="#f4f1e9"/>
      </g>
    </g>

    <!-- foreground swell — the ship rides it -->
    <g>
      <path d="M78 624 C 170 616 250 604 330 584 C 392 569 446 560 522 568 L522 802 L78 802 Z" fill="#2f6ea5"/>
      <path d="M78 624 C 170 616 250 604 330 584 C 392 569 446 560 522 568" fill="none" stroke="#dbeaf4" stroke-width="6" stroke-linecap="round"/>
      <path d="M78 672 C 170 664 250 656 330 642 C 400 630 460 632 522 628 L522 802 L78 802 Z" fill="#1c3f73" opacity="0.4"/>
      <g fill="none" stroke="#bcd6e8" stroke-width="4" stroke-linecap="round" opacity="0.7">
        <path d="M96 712 q42 -22 84 0 t84 0 t84 0 t84 0 t84 0"/>
        <path d="M84 758 q46 -24 92 0 t92 0 t92 0 t92 0 t92 0"/>
      </g>
    </g>
  </g>

  <!-- inner filigree frame -->
  <g fill="none" stroke="#1c3f73">
    <rect x="68" y="68" width="464" height="744" stroke-width="2"/>
    <rect x="76" y="76" width="448" height="728" stroke-width="1"/>
  </g>

  <!-- rope border bands -->
  <rect x="64" y="0"   width="472" height="64" fill="url(#ropeH)"/>
  <rect x="64" y="816" width="472" height="64" fill="url(#ropeH)"/>
  <rect x="0"  y="64"  width="64" height="752" fill="url(#ropeV)"/>
  <rect x="536" y="64" width="64" height="752" fill="url(#ropeV)"/>

  <!-- corner tiles -->
  <g>
    <rect x="0" y="0" width="64" height="64" fill="#f4f1e9"/>
    <rect x="536" y="0" width="64" height="64" fill="#f4f1e9"/>
    <rect x="0" y="816" width="64" height="64" fill="#f4f1e9"/>
    <rect x="536" y="816" width="64" height="64" fill="#f4f1e9"/>
    <use href="#corner" x="0" y="0"/>
    <use href="#corner" x="536" y="0"/>
    <use href="#corner" x="0" y="816"/>
    <use href="#corner" x="536" y="816"/>
  </g>

  <!-- outer keyline -->
  <rect x="2" y="2" width="596" height="876" fill="none" stroke="#1c3f73" stroke-width="3"/>
</svg>
